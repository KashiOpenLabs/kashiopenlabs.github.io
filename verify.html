<!DOCTYPE html>
<html>
<head>
    <title>Kashi Open Labs - Internship Verification</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Internship Verification</h1>

    <input type="text" id="internId" placeholder="Enter Internship ID">
    <button onclick="verifyIntern()">Verify</button>

    <div id="result" style="margin-top:20px;"></div>

    <script>
        async function verifyIntern() {
            const id = document.getElementById("internId").value.trim();

            const response = await fetch("data/interns.json");
            const interns = await response.json();

            const intern = interns.find(x => x.id === id);

            const result = document.getElementById("result");

            if (intern) {
                result.innerHTML = `
                    <h2>✅ Verified</h2>
                    <p><strong>Name:</strong> ${intern.name}</p>
                    <p><strong>ID:</strong> ${intern.id}</p>
                    <p><strong>Duration:</strong> ${intern.duration}</p>
                    <p><strong>Project:</strong> ${intern.project}</p>
                    <p><strong>Status:</strong> ${intern.status}</p>
                `;
            } else {
                result.innerHTML = `
                    <h2>❌ Record Not Found</h2>
                `;
            }
        }
    </script>
</body>
</html>
